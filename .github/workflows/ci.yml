name: Next.js CI/CD Pipeline

on:
  push:
    branches: [develop, CI/CD-Implementation]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: 20

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: Debug Workflow Context
    runs-on: ubuntu-latest
    steps:
      - name: Log context
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Build Dev Condition: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/CI/CD-Implementation')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev') }}"
          echo "Build Staging Condition: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' }}"
          echo "Build Prod Condition: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod' }}"

  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run linting
        run: npm run lint || (echo "Linting failed!" && exit 1)

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: TypeScript type checking
        run: npm run typecheck || (echo "Type checking failed!" && exit 1)

  test:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run tests
        run: npm run test:ci
      - name: Run accessibility tests
        run: npm run test:a11y
        continue-on-error: true
      - name: Upload test reports
        uses: actions/upload-artifact@v4.3.6
        if: always()
        with:
          name: test-reports
          path: |
            coverage/
            test-results/
            a11y-results/

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      - name: Run npm audit
        run: npm audit --audit-level=high
      - name: Save npm audit report
        run: npm audit --json > audit-report.json
      - name: Upload security reports
        uses: actions/upload-artifact@v4.3.6
        if: always()
        with:
          name: security-reports
          path: audit-report.json

  e2e-tests:
    name: End-to-End Testing
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build for E2E testing
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6.7.6
        with:
          start: npm start
          wait-on: 'http://localhost:3000'
          record: false
          browser: chrome
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4.3.6
        if: always()
        with:
          name: cypress-results
          path: |
            cypress/videos/
            cypress/screenshots/

  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build for testing
        run: npm run build
        env:
          NODE_ENV: production
      - name: Start server
        run: npm start > server.log 2>&1 &
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/ --timeout 30000
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3000/
          uploadArtifacts: false
          temporaryPublicStorage: true
          runs: 3
      - name: Upload performance test results
        uses: actions/upload-artifact@v4.3.6
        with:
          name: lighthouse_results
          path: .lighthouseci/
      - name: Upload server logs
        uses: actions/upload-artifact@v4.3.6
        if: failure()
        with:
          name: server-logs
          path: server.log

  build-dev:
    name: Build Dev
    needs: [lint, type-check, test, security-scan]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/CI/CD-Implementation')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate environment secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_API_URL_DEV }}" ]; then
            echo "NEXT_PUBLIC_API_URL_DEV is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-dev-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-dev-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-dev-
      - name: Build application
        run: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_DEV }} npm run build
        env:
          NODE_ENV: development
      - name: Analyze bundle size
        run: npm run analyze || echo "Bundle analysis not configured"
      - name: Run bundle size diffing
        uses: preactjs/compressed-size-action@v2
        with:
          build-script: 'build'
          pattern: '.next/**/*.js'
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: build-output-dev
          path: .next/

  build-staging:
    name: Build Staging
    needs: [lint, type-check, test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate environment secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_API_URL_STAGING }}" ]; then
            echo "NEXT_PUBLIC_API_URL_STAGING is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-staging-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-staging-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-staging-
      - name: Build application
        run: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_STAGING }} npm run build
        env:
          NODE_ENV: staging
      - name: Analyze bundle size
        run: npm run analyze || echo "Bundle analysis not configured"
      - name: Run bundle size diffing
        uses: preactjs/compressed-size-action@v2
        with:
          build-script: 'build'
          pattern: '.next/**/*.js'
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: build-output-staging
          path: .next/

  build-prod:
    name: Build Prod
    needs: [lint, type-check, test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate environment secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_API_URL_PROD }}" ]; then
            echo "NEXT_PUBLIC_API_URL_PROD is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-prod-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-prod-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-prod-
      - name: Build application
        run: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }} npm run build
        env:
          NODE_ENV: production
      - name: Analyze bundle size
        run: npm run analyze || echo "Bundle analysis not configured"
      - name: Run bundle size diffing
        uses: preactjs/compressed-size-action@v2
        with:
          build-script: 'build'
          pattern: '.next/**/*.js'
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: build-output-prod
          path: .next/

  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    needs: [lint, type-check, test, security-scan]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "VERCEL_ORG_ID is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "VERCEL_PROJECT_ID is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build for preview
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_DEV }}
      - name: Deploy preview to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel-deployment
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--scope ${{ secrets.VERCEL_SCOPE }}'
      - name: Comment PR with Preview URL
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const deploymentUrl = '${{ steps.vercel-deployment.outputs.url }}';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ Preview deployment is ready! URL: ${deploymentUrl}`
            });

  deploy-dev:
    name: Deploy Dev
    needs: build-dev
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/CI/CD-Implementation')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
      url: ${{ steps.deployment.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "VERCEL_ORG_ID is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "VERCEL_PROJECT_ID is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: build-output-dev
          path: .next/
      - name: Deploy to Vercel
        id: deployment
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ''
          scope: ${{ secrets.VERCEL_SCOPE }}
      - name: Save deployment URL
        run: echo "${{ steps.deployment.outputs.url }}" > deployment-url.txt
      - name: Upload deployment URL artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: deployment-url-dev
          path: deployment-url.txt
      - name: Post-deployment health check
        run: |
          HEALTH_URL="${{ steps.deployment.outputs.url }}/api/health"
          echo "Running health check on $HEALTH_URL"
          MAX_ATTEMPTS=5
          ATTEMPT=1
          DELAY=10
          SUCCESS=false
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            if curl --silent --fail "$HEALTH_URL" | grep -q '"status":"ok"'; then
              SUCCESS=true
              echo "Health check passed!"
            else
              echo "Health check failed. Retrying in $DELAY seconds..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "Health check failed after $MAX_ATTEMPTS attempts"
            exit 1
          fi
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ steps.deployment.outputs.url }}
        continue-on-error: true
      - name: Run smoke tests
        run: |
          DEPLOYMENT_URL="${{ steps.deployment.outputs.url }}"
          npm run test:smoke -- --url $DEPLOYMENT_URL
      - name: Send deployment email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'Deployment to dev - ${{ job.status }}'
          body: 'The deployment to the dev environment has ${{ job.status }}. URL: ${{ steps.deployment.outputs.url }}'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: 'GitHub Actions <no-reply@github.com>'

  deploy-staging:
    name: Deploy Staging
    needs: build-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ steps.deployment.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "VERCEL_ORG_ID is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "VERCEL_PROJECT_ID is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: build-output-staging
          path: .next/
      - name: Build Docker image
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          push: false
          tags: nextjs-app:${{ github.sha }}
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'nextjs-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
      - name: Deploy to Vercel
        id: deployment
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ''
          scope: ${{ secrets.VERCEL_SCOPE }}
      - name: Save deployment URL
        run: echo "${{ steps.deployment.outputs.url }}" > deployment-url.txt
      - name: Upload deployment URL artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: deployment-url-staging
          path: deployment-url.txt
      - name: Post-deployment health check
        run: |
          HEALTH_URL="${{ steps.deployment.outputs.url }}/api/health"
          echo "Running health check on $HEALTH_URL"
          MAX_ATTEMPTS=5
          ATTEMPT=1
          DELAY=10
          SUCCESS=false
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            if curl --silent --fail "$HEALTH_URL" | grep -q '"status":"ok"'; then
              SUCCESS=true
              echo "Health check passed!"
            else
              echo "Health check failed. Retrying in $DELAY seconds..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "Health check failed after $MAX_ATTEMPTS attempts"
            exit 1
          fi
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ steps.deployment.outputs.url }}
        continue-on-error: true
      - name: Run smoke tests
        run: |
          DEPLOYMENT_URL="${{ steps.deployment.outputs.url }}"
          npm run test:smoke -- --url $DEPLOYMENT_URL
      - name: Send deployment email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'Deployment to staging - ${{ job.status }}'
          body: 'The deployment to the staging environment has ${{ job.status }}. URL: ${{ steps.deployment.outputs.url }}'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: 'GitHub Actions <no-reply@github.com>'

  deploy-prod:
    name: Deploy Prod
    needs: build-prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: prod
      url: ${{ steps.deployment.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "VERCEL_ORG_ID is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "VERCEL_PROJECT_ID is missing!"
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: build-output-prod
          path: .next/
      - name: Build Docker image
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          push: false
          tags: nextjs-app:${{ github.sha }}
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'nextjs-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
      - name: Deploy to Vercel
        id: deployment
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_SCOPE }}
      - name: Save deployment URL
        run: echo "${{ steps.deployment.outputs.url }}" > deployment-url.txt
      - name: Upload deployment URL artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: deployment-url-prod
          path: deployment-url.txt
      - name: Post-deployment health check
        run: |
          HEALTH_URL="${{ steps.deployment.outputs.url }}/api/health"
          echo "Running health check on $HEALTH_URL"
          MAX_ATTEMPTS=5
          ATTEMPT=1
          DELAY=10
          SUCCESS=false
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            if curl --silent --fail "$HEALTH_URL" | grep -q '"status":"ok"'; then
              SUCCESS=true
              echo "Health check passed!"
            else
              echo "Health check failed. Retrying in $DELAY seconds..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "Health check failed after $MAX_ATTEMPTS attempts"
            exit 1
          fi
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ steps.deployment.outputs.url }}
        continue-on-error: true
      - name: Run smoke tests
        run: |
          DEPLOYMENT_URL="${{ steps.deployment.outputs.url }}"
          npm run test:smoke -- --url $DEPLOYMENT_URL
      - name: Send deployment email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'Deployment to prod - ${{ job.status }}'
          body: 'The deployment to the prod environment has ${{ job.status }}. URL: ${{ steps.deployment.outputs.url }}'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: 'GitHub Actions <no-reply@github.com>'

  release:
    name: Create Release
    needs: deploy-prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Create Release with Semantic Versioning
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Release Notes
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "## What's Changed" > RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md
      - name: Create GitHub Release
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2.0.5
        with:
          tag_name: v${{ steps.semantic.outputs.new_release_version }}
          name: Release v${{ steps.semantic.outputs.new_release_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  monitoring:
    name: Setup Monitoring
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'staging')
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Download deployment URL artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: deployment-url-${{ github.event.inputs.environment }}
          path: .
      - name: Read deployment URL
        id: read-url
        run: |
          DEPLOYMENT_URL=$(cat deployment-url.txt)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV
      - name: Check application health
        run: |
          curl --silent --fail "${{ env.DEPLOYMENT_URL }}/api/health" || exit 1
      - name: Setup uptime monitoring
        uses: upptime/upptime-monitor@master
        with:
          command: 'update'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          UPPTIME_ENDPOINT: ${{ env.DEPLOYMENT_URL }}
      - name: Activate datadog RUM monitoring
        run: |
          curl -X POST "${{ secrets.DATADOG_API_URL }}/api/v1/rum/enable" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: ${{ secrets.DATADOG_API_KEY }}" \
          -d '{"app_name": "nextjs-app", "env": "${{ github.event.inputs.environment }}"}'